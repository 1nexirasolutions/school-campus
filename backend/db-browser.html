<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampusLink DB Browser</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }
    .header {
      background: linear-gradient(135deg, #4F46E5, #7C3AED);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 4px 20px rgba(79, 70, 229, 0.3);
    }
    .header h1 { font-size: 22px; font-weight: 700; }
    .header span { opacity: 0.7; font-size: 14px; }
    .container { display: flex; height: calc(100vh - 72px); }
    
    /* Sidebar */
    .sidebar {
      width: 260px;
      background: #1e293b;
      border-right: 1px solid #334155;
      overflow-y: auto;
      flex-shrink: 0;
    }
    .sidebar h3 {
      padding: 16px 20px 8px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #64748b;
    }
    .collection-item {
      padding: 12px 20px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 3px solid transparent;
      transition: all 0.15s;
    }
    .collection-item:hover { background: #334155; }
    .collection-item.active {
      background: #334155;
      border-left-color: #7C3AED;
      color: #a78bfa;
    }
    .collection-item .name { font-size: 14px; font-weight: 500; }
    .collection-item .count {
      background: #475569;
      color: #cbd5e1;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 12px;
    }
    .collection-item.active .count {
      background: #7C3AED;
      color: white;
    }
    
    /* Main content */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .toolbar {
      padding: 16px 24px;
      background: #1e293b;
      border-bottom: 1px solid #334155;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .toolbar h2 { font-size: 18px; font-weight: 600; flex: 1; }
    .toolbar input {
      background: #0f172a;
      border: 1px solid #475569;
      color: #e2e8f0;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 13px;
      width: 250px;
      outline: none;
    }
    .toolbar input:focus { border-color: #7C3AED; }
    .toolbar .info {
      font-size: 13px;
      color: #94a3b8;
    }
    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.15s;
    }
    .btn-primary { background: #7C3AED; color: white; }
    .btn-primary:hover { background: #6D28D9; }
    .btn-secondary { background: #334155; color: #e2e8f0; }
    .btn-secondary:hover { background: #475569; }
    
    /* Table */
    .table-wrapper {
      flex: 1;
      overflow: auto;
      padding: 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th {
      background: #1e293b;
      position: sticky;
      top: 0;
      padding: 12px 16px;
      text-align: left;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.5px;
      border-bottom: 2px solid #334155;
      z-index: 10;
    }
    td {
      padding: 10px 16px;
      border-bottom: 1px solid #1e293b;
      max-width: 300px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #cbd5e1;
    }
    tr:hover td { background: #1e293b; }
    td.cell-role {
      font-weight: 600;
    }
    .role-principal { color: #f87171; }
    .role-teacher { color: #60a5fa; }
    .role-student { color: #34d399; }
    
    /* Welcome screen */
    .welcome {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      color: #64748b;
    }
    .welcome .icon { font-size: 48px; }
    .welcome p { font-size: 15px; }
    
    /* Pagination */
    .pagination {
      padding: 12px 24px;
      background: #1e293b;
      border-top: 1px solid #334155;
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: center;
    }
    .pagination .page-info { font-size: 13px; color: #94a3b8; }
    
    /* JSON modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: #1e293b;
      border-radius: 12px;
      padding: 24px;
      max-width: 700px;
      max-height: 80vh;
      width: 90%;
      overflow: auto;
      border: 1px solid #334155;
    }
    .modal h3 {
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
    }
    .modal pre {
      background: #0f172a;
      padding: 16px;
      border-radius: 8px;
      overflow: auto;
      font-size: 12px;
      line-height: 1.5;
      color: #a78bfa;
    }
    .modal .close-btn {
      cursor: pointer;
      color: #94a3b8;
      font-size: 18px;
      background: none;
      border: none;
    }
    
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="header">
    <span style="font-size:24px">🗄️</span>
    <div>
      <h1>CampusLink DB Browser</h1>
      <span>MongoDB · schoolerp</span>
    </div>
  </div>
  
  <div class="container">
    <div class="sidebar" id="sidebar">
      <h3>Collections</h3>
      <div id="collections-list">
        <div class="loading">Loading...</div>
      </div>
    </div>
    
    <div class="main">
      <div id="toolbar" class="toolbar" style="display:none">
        <h2 id="collection-title"></h2>
        <input type="text" id="search-input" placeholder="🔍 Search documents..." />
        <span class="info" id="doc-count"></span>
        <button class="btn btn-primary" id="refresh-btn" onclick="loadCollection(currentCollection)">↻ Refresh</button>
      </div>
      
      <div id="welcome" class="welcome">
        <div class="icon">📊</div>
        <p>Select a collection from the sidebar to browse data</p>
      </div>
      
      <div id="table-wrapper" class="table-wrapper" style="display:none">
        <table>
          <thead id="table-head"></thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
      
      <div id="pagination" class="pagination" style="display:none">
        <button class="btn btn-secondary" id="prev-btn" onclick="prevPage()">← Prev</button>
        <span class="page-info" id="page-info"></span>
        <button class="btn btn-secondary" id="next-btn" onclick="nextPage()">Next →</button>
      </div>
    </div>
  </div>
  
  <!-- JSON detail modal -->
  <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
    <div class="modal">
      <h3>
        <span>Document Details</span>
        <button class="close-btn" onclick="document.getElementById('modal-overlay').classList.remove('active')">✕</button>
      </h3>
      <pre id="modal-content"></pre>
    </div>
  </div>
  
  <script>
    const API = 'http://localhost:8000/api';
    let currentCollection = null;
    let currentPage = 0;
    let allDocs = [];
    const PAGE_SIZE = 50;
    
    // Load collections on start
    async function loadCollections() {
      try {
        const res = await fetch(`${API}/db/collections`);
        const data = await res.json();
        const list = document.getElementById('collections-list');
        list.innerHTML = data.collections.map(c => `
          <div class="collection-item" data-name="${c.name}" onclick="selectCollection('${c.name}')">
            <span class="name">${c.name}</span>
            <span class="count">${c.count}</span>
          </div>
        `).join('');
      } catch (err) {
        document.getElementById('collections-list').innerHTML = 
          '<div style="padding:16px;color:#f87171">Error connecting to backend</div>';
      }
    }
    
    function selectCollection(name) {
      currentCollection = name;
      currentPage = 0;
      document.querySelectorAll('.collection-item').forEach(el => {
        el.classList.toggle('active', el.dataset.name === name);
      });
      loadCollection(name);
    }
    
    async function loadCollection(name) {
      document.getElementById('welcome').style.display = 'none';
      document.getElementById('toolbar').style.display = 'flex';
      document.getElementById('table-wrapper').style.display = 'block';
      document.getElementById('collection-title').textContent = name;
      document.getElementById('table-body').innerHTML = '<tr><td colspan="20" class="loading">Loading...</td></tr>';
      
      try {
        const res = await fetch(`${API}/db/collections/${name}?limit=200`);
        const data = await res.json();
        allDocs = data.documents;
        document.getElementById('doc-count').textContent = `${data.total} documents`;
        document.getElementById('search-input').value = '';
        renderTable(allDocs);
      } catch (err) {
        document.getElementById('table-body').innerHTML = '<tr><td style="color:#f87171">Error loading data</td></tr>';
      }
    }
    
    function renderTable(docs) {
      if (!docs.length) {
        document.getElementById('table-head').innerHTML = '';
        document.getElementById('table-body').innerHTML = '<tr><td style="padding:40px;text-align:center;color:#64748b">No documents found</td></tr>';
        document.getElementById('pagination').style.display = 'none';
        return;
      }
      
      // Get all unique keys
      const keys = [...new Set(docs.flatMap(d => Object.keys(d)))];
      
      // Paginate
      const start = currentPage * PAGE_SIZE;
      const pageDocs = docs.slice(start, start + PAGE_SIZE);
      
      // Render header
      document.getElementById('table-head').innerHTML = '<tr>' + 
        keys.map(k => `<th>${k}</th>`).join('') + 
        '<th>Actions</th></tr>';
      
      // Render rows
      document.getElementById('table-body').innerHTML = pageDocs.map((doc, i) => {
        return '<tr>' + keys.map(k => {
          let val = doc[k];
          let cls = '';
          if (k === 'role') {
            cls = `cell-role role-${val}`;
          }
          if (val === null || val === undefined) val = '<span style="color:#475569">null</span>';
          else if (typeof val === 'object') val = '<span style="color:#94a3b8">{...}</span>';
          else if (typeof val === 'boolean') val = val ? '✅' : '❌';
          else val = String(val);
          if (val.length > 50) val = val.slice(0, 50) + '…';
          return `<td class="${cls}">${val}</td>`;
        }).join('') + 
        `<td><button class="btn btn-secondary" onclick='showDoc(${start + i})' style="padding:4px 10px;font-size:12px">View</button></td></tr>`;
      }).join('');
      
      // Pagination
      const totalPages = Math.ceil(docs.length / PAGE_SIZE);
      if (totalPages > 1) {
        document.getElementById('pagination').style.display = 'flex';
        document.getElementById('page-info').textContent = `Page ${currentPage + 1} of ${totalPages}`;
        document.getElementById('prev-btn').disabled = currentPage === 0;
        document.getElementById('next-btn').disabled = currentPage >= totalPages - 1;
      } else {
        document.getElementById('pagination').style.display = 'none';
      }
    }
    
    function prevPage() { if (currentPage > 0) { currentPage--; renderTable(filteredDocs()); } }
    function nextPage() { currentPage++; renderTable(filteredDocs()); }
    
    function filteredDocs() {
      const q = document.getElementById('search-input').value.toLowerCase();
      if (!q) return allDocs;
      return allDocs.filter(d => JSON.stringify(d).toLowerCase().includes(q));
    }
    
    function showDoc(index) {
      const docs = filteredDocs();
      const doc = docs[index];
      document.getElementById('modal-content').textContent = JSON.stringify(doc, null, 2);
      document.getElementById('modal-overlay').classList.add('active');
    }
    
    function closeModal(e) {
      if (e.target.id === 'modal-overlay') {
        document.getElementById('modal-overlay').classList.remove('active');
      }
    }
    
    // Search
    document.getElementById('search-input').addEventListener('input', () => {
      currentPage = 0;
      renderTable(filteredDocs());
    });
    
    // Init
    loadCollections();
  </script>
</body>
</html>
